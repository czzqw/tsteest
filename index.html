<!DOCTYPE html>
<main>

<section class="banner text-center text-light d-flex align-items-center justify-content-center">
  <div>
    <h1>Catálogo Copa do Mundo 2026</h1>
    <p>Os melhores produtos da Copa do Mundo</p>
  </div>
</section>

<section class="container mt-5">

  <div class="row mb-4">

    <div class="col-md-6 mb-3">
      <input type="text" id="pesquisa" class="form-control" placeholder="Pesquisar produtos...">
    </div>

    <div class="col-md-6 mb-3">
      <select class="form-select" id="categoriaFiltro">
        <option value="todos">Todas Categorias</option>
        <option value="Camisas">Camisas</option>
        <option value="Acessórios">Acessórios</option>
        <option value="Bonés">Bonés</option>
        <option value="Chuteiras">Chuteiras</option>
        <option value="Outros">Outros</option>
      </select>
    </div>

  </div>

  <div class="row" id="listaProdutos"></div>

</section>

<section class="container mt-5 mb-5">

  <h2 class="text-center text-light mb-4">Carrinho de Compras</h2>

  <div class="table-responsive">
    <table class="table table-dark table-striped">
      <thead>
        <tr>
          <th>Produto</th>
          <th>Preço</th>
          <th>Quantidade</th>
          <th>Total</th>
          <th>Ações</th>
        </tr>
      </thead>

      <tbody id="carrinhoTabela"></tbody>
    </table>
  </div>

  <h3 class="text-light">Total: R$ <span id="totalCompra">0.00</span></h3>

  <div id="paypal-button-container" class="mt-4"></div>

</section>

</main>

<footer class="bg-dark text-light text-center p-3">
  <p>© 2026 EdsonGlenderCode Systems - Todos os direitos reservados.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://www.paypal.com/sdk/js?client-id=sb&currency=BRL"></script>
<script src="assets/js/script.js"></script>

</body>
</html>
